<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Call</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a0b2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }
        iframe {
            width: 100%;
            max-width: 400px;
            height: 600px;
            border: none;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
        }
        .btn {
            display: inline-block;
            padding: 16px 48px;
            margin-top: 20px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            color: rgba(255,255,255,0.6);
            margin: 16px 0;
            font-size: 14px;
        }
        .footer {
            color: rgba(255,255,255,0.2);
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Talk to Sarah</h1>
        <div class="status" id="status">Ready to start</div>
        <iframe id="callIframe" allow="microphone"></iframe>
        <br>
        <button class="btn" id="startBtn">🎙️ Start Call</button>
        <div class="footer">🔒 Secure • No sign-up required</div>
    </div>

    <script>
        const AGENT_ID = 'agent_4cf5ce74faa61c4a27f7661216';
        const BACKEND_URL = 'https://retell-backend-rho.vercel.app';
        const iframe = document.getElementById('callIframe');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        let isActive = false;

        async function startCall() {
            try {
                startBtn.disabled = true;
                statusEl.textContent = 'Creating call...';
                startBtn.textContent = '⏳ Connecting...';

                const response = await fetch(`${BACKEND_URL}/api/create-web-call`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: AGENT_ID })
                });

                if (!response.ok) throw new Error('API error');
                const data = await response.json();

                if (!data.access_token) throw new Error('No access token');

                const retellUrl = `https://app.retellai.com/web-call?access_token=${data.access_token}`;
                iframe.src = retellUrl;
                
                isActive = true;
                statusEl.textContent = '✅ Connected! Talk to Sarah';
                startBtn.textContent = '🔴 End Call';
                startBtn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                startBtn.disabled = false;

            } catch (error) {
                statusEl.textContent = '❌ Error: ' + error.message;
                startBtn.textContent = '🔄 Try Again';
                startBtn.disabled = false;
                startBtn.style.background = 'linear-gradient(135deg, #7c3aed, #a78bfa)';
            }
        }

        function endCall() {
            iframe.src = '';
            isActive = false;
            statusEl.textContent = 'Call ended';
            startBtn.textContent = '🎙️ Start Call';
            startBtn.style.background = 'linear-gradient(135deg, #7c3aed, #a78bfa)';
            startBtn.disabled = false;
        }

        startBtn.addEventListener('click', () => {
            if (isActive) {
                endCall();
            } else {
                startCall();
            }
        });
    </script>
</body>
</html>
