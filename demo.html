<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Our AI Voice - Master Voice Automation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 50%, #1a0b2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            color: #a78bfa;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            position: relative;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.3);
            transition: all 0.3s ease;
        }

        .avatar-circle.listening {
            animation: pulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 80px rgba(124, 58, 237, 0.5);
        }

        .avatar-circle.speaking {
            animation: pulse 0.8s ease-in-out infinite;
            box-shadow: 0 0 100px rgba(124, 58, 237, 0.6);
        }

        .avatar-circle.connecting {
            animation: spin 1s linear infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .status-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            min-height: 24px;
        }

        .status-text.error {
            color: #f87171;
        }

        .status-text.success {
            color: #34d399;
        }

        .btn {
            width: 100%;
            padding: 16px 32px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: white;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn.end-call {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn.end-call:hover:not(:disabled) {
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.4);
        }

        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 40px;
            margin-top: 16px;
        }

        .wave-bar {
            width: 4px;
            height: 20px;
            background: #a78bfa;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .wave-bar.active {
            animation: wave 0.5s ease-in-out infinite alternate;
        }

        .wave-bar:nth-child(2) {
            animation-delay: 0.1s;
        }
        .wave-bar:nth-child(3) {
            animation-delay: 0.2s;
        }
        .wave-bar:nth-child(4) {
            animation-delay: 0.3s;
        }
        .wave-bar:nth-child(5) {
            animation-delay: 0.4s;
        }
        .wave-bar:nth-child(6) {
            animation-delay: 0.5s;
        }
        .wave-bar:nth-child(7) {
            animation-delay: 0.6s;
        }

        @keyframes wave {
            0% {
                height: 10px;
                opacity: 0.3;
            }
            100% {
                height: 35px;
                opacity: 1;
            }
        }

        .transcript-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            min-height: 60px;
            max-height: 120px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .transcript-box p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }

        .transcript-box .user {
            color: #a78bfa;
            font-weight: 500;
        }

        .transcript-box .agent {
            color: #34d399;
            font-weight: 500;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 24px;
            letter-spacing: 0.5px;
        }

        /* Scrollbar styling */
        .transcript-box::-webkit-scrollbar {
            width: 4px;
        }

        .transcript-box::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .transcript-box::-webkit-scrollbar-thumb {
            background: rgba(167, 139, 250, 0.3);
            border-radius: 2px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 24px;
            }

            .avatar-circle {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }

            .btn {
                font-size: 16px;
                padding: 14px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✦ Master Voice Automation</div>
        <h1>Test Our AI Voice</h1>
        <p class="subtitle">Have a real conversation with Sarah, our AI receptionist. She'll handle your call just like a human would.</p>

        <div class="avatar-container">
            <div class="avatar-circle" id="avatar">
                🤖
            </div>
        </div>

        <div class="wave-container" id="waveContainer">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <div class="status-text" id="status">Ready to talk to Sarah</div>

        <button class="btn" id="callBtn">Start Conversation</button>

        <div class="transcript-box" id="transcript">
            <p style="color: rgba(255,255,255,0.4); font-style: italic;">Transcript will appear here...</p>
        </div>

        <p class="footer-text">🔒 Secure • No sign-up required • Your call is private</p>
    </div>

    <script>
        // Retell Web Client
        let retellClient = null;
        let isCallActive = false;
        let transcriptLines = [];

        const statusEl = document.getElementById('status');
        const avatarEl = document.getElementById('avatar');
        const callBtn = document.getElementById('callBtn');
        const transcriptEl = document.getElementById('transcript');
        const waveBars = document.querySelectorAll('.wave-bar');

        // Retell Agent ID
        const AGENT_ID = 'agent_4cf5ce74faa61c4a27f7661216';
        const BACKEND_URL = 'https://retell-backend-rho.vercel.app';

        function updateStatus(text, type = '') {
            statusEl.textContent = text;
            statusEl.className = 'status-text' + (type ? ' ' + type : '');
        }

        function updateAvatar(state) {
            avatarEl.className = 'avatar-circle';
            if (state === 'listening') {
                avatarEl.classList.add('listening');
                avatarEl.textContent = '👂';
            } else if (state === 'speaking') {
                avatarEl.classList.add('speaking');
                avatarEl.textContent = '🗣️';
            } else if (state === 'connecting') {
                avatarEl.classList.add('connecting');
                avatarEl.textContent = '🔄';
            } else if (state === 'idle') {
                avatarEl.textContent = '🤖';
            } else if (state === 'error') {
                avatarEl.textContent = '❌';
            } else if (state === 'ended') {
                avatarEl.textContent = '👋';
            }
        }

        function toggleWave(active) {
            waveBars.forEach(bar => {
                if (active) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
        }

        function addTranscript(text, speaker) {
            const speakerLabel = speaker === 'user' ? 'You' : 'Sarah';
            const className = speaker === 'user' ? 'user' : 'agent';
            transcriptLines.push(`<p><span class="${className}">${speakerLabel}:</span> ${text}</p>`);
            if (transcriptLines.length > 10) {
                transcriptLines.shift();
            }
            transcriptEl.innerHTML = transcriptLines.join('');
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        function setCallButton(endCall = false) {
            if (endCall) {
                callBtn.textContent = 'End Call';
                callBtn.className = 'btn end-call';
                callBtn.disabled = false;
            } else {
                callBtn.textContent = 'Start Conversation';
                callBtn.className = 'btn';
                callBtn.disabled = false;
            }
        }

        // Create a web call via backend
        async function createWebCall() {
            try {
                updateStatus('Connecting to Sarah...', '');
                updateAvatar('connecting');

                const response = await fetch(`${BACKEND_URL}/api/create-web-call`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        agent_id: AGENT_ID,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error creating web call:', error);
                updateStatus('Failed to connect. Please try again.', 'error');
                updateAvatar('error');
                return null;
            }
        }

        // Initialize Retell client
        function initRetellClient(accessToken) {
            return new Promise((resolve, reject) => {
                // Load Retell Web SDK
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/retell-sdk@latest/dist/retell-web-sdk.umd.js';
                script.onload = () => {
                    try {
                        const client = new window.RetellWebClient();
                        resolve(client);
                    } catch (err) {
                        reject(err);
                    }
                };
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function startCall() {
            if (isCallActive) {
                // End the call
                endCall();
                return;
            }

            try {
                callBtn.disabled = true;
                updateStatus('Requesting microphone access...', '');

                // Request microphone permission first
                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (permError) {
                    updateStatus('Microphone access denied. Please allow mic access and try again.', 'error');
                    updateAvatar('error');
                    callBtn.disabled = false;
                    return;
                }

                updateStatus('Creating call session...', '');

                // Create web call
                const callData = await createWebCall();
                if (!callData || !callData.access_token) {
                    callBtn.disabled = false;
                    return;
                }

                updateStatus('Connecting to Sarah...', '');
                updateAvatar('connecting');

                // Initialize Retell client
                const client = await initRetellClient(callData.access_token);

                // Set up event handlers
                client.on('connected', () => {
                    isCallActive = true;
                    updateStatus('Connected! Sarah is listening...', '');
                    updateAvatar('listening');
                    toggleWave(true);
                    setCallButton(true);
                    addTranscript('Hello! This is Sarah from Master Voice Automation. How can I help you today?', 'agent');
                });

                client.on('audio', (audio) => {
                    // Audio is being processed
                });

                client.on('update', (update) => {
                    if (update.transcript) {
                        const speaker = update.is_final ? 'agent' : 'user';
                        const text = update.transcript;
                        if (update.is_final) {
                            addTranscript(text, speaker);
                        }
                    }

                    if (update.status) {
                        if (update.status === 'listening') {
                            updateStatus('Sarah is listening...', '');
                            updateAvatar('listening');
                            toggleWave(true);
                        } else if (update.status === 'speaking') {
                            updateStatus('Sarah is speaking...', '');
                            updateAvatar('speaking');
                            toggleWave(true);
                        } else if (update.status === 'thinking') {
                            updateStatus('Sarah is thinking...', '');
                            updateAvatar('listening');
                            toggleWave(true);
                        }
                    }
                });

                client.on('error', (error) => {
                    console.error('Retell error:', error);
                    updateStatus('Connection error. Please try again.', 'error');
                    updateAvatar('error');
                    toggleWave(false);
                    isCallActive = false;
                    callBtn.disabled = false;
                    setCallButton(false);
                });

                client.on('ended', () => {
                    updateStatus('Call ended. Thank you for testing!', 'success');
                    updateAvatar('ended');
                    toggleWave(false);
                    isCallActive = false;
                    callBtn.disabled = false;
                    setCallButton(false);
                    addTranscript('*Call ended*', 'system');
                });

                // Store client reference
                retellClient = client;

                // Start the call
                await client.startCall({
                    accessToken: callData.access_token,
                });

            } catch (error) {
                console.error('Call error:', error);
                updateStatus('Something went wrong. Please refresh and try again.', 'error');
                updateAvatar('error');
                toggleWave(false);
                isCallActive = false;
                callBtn.disabled = false;
                setCallButton(false);
            }
        }

        function endCall() {
            if (retellClient && isCallActive) {
                try {
                    retellClient.stopCall();
                } catch (e) {
                    console.error('Error ending call:', e);
                }
            }
            isCallActive = false;
            toggleWave(false);
            updateStatus('Call ending...', '');
            callBtn.disabled = true;

            setTimeout(() => {
                callBtn.disabled = false;
                setCallButton(false);
                if (statusEl.textContent === 'Call ending...') {
                    updateStatus('Call ended.', 'success');
                    updateAvatar('ended');
                }
            }, 1000);
        }

        // Event listener
        callBtn.addEventListener('click', startCall);

        // Handle page close
        window.addEventListener('beforeunload', () => {
            if (retellClient && isCallActive) {
                try {
                    retellClient.stopCall();
                } catch (e) {
                    // ignore
                }
            }
        });

        // Initial state
        updateStatus('Ready to talk to Sarah', '');
        updateAvatar('idle');
        setCallButton(false);
    </script>
</body>
</html>
